spring.application.name=lrs
server.port=8082
server.servlet.context-path=/lrs

spring.datasource.url=jdbc:sqlserver://localhost:8012;databaseName=LittleRiseSchool;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Suveena@2719
spring.databaseName=LittleRiseSchool
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.show-sql=true
