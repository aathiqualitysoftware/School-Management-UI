<div class="dashboard-container">
    <h1 class="dashboard-title">Welcome Admin Dashboard</h1>
  <!-- Top Summary Boxes -->
<div class="summary-cards">
  <div class="card students-card">
    <h3>Students</h3>
    <p>0 / 33</p>
    <small>Today's Attendance</small>
    <div class="icons">
      <span>👦 15</span>
      <span>👧 16</span>
    </div>
  </div>

  <div class="card staff-card">
    <h3>Total Staff</h3>
    <p>15</p>
    <small>Active Staff</small>
    <div class="icons">
      <span>👨 10</span>
      <span>👩 5</span>
    </div>
  </div>

  <div class="card fee-card">
    <h3>Fee Collections</h3>
    <p>₹3,05,000</p>
    <small>This Month</small>
  </div>

  <div class="card exams-card">
    <h3>Upcoming Exams</h3>
    <p>0</p>
    <small>Next 30 Days</small>
  </div>
</div>

<!-- Charts Column -->
<div class="container">
  <div class="chart-section students-card" style="width: 500px !important;">
    <h3>Attendance Summary</h3>
    <canvas id="attendanceChart"></canvas>
  </div>

  <div class="chart-section fee-card" style="width: 500px !important;">
    <h3>Fee Collection Summary</h3>
    <canvas id="feeChart"></canvas>
  </div>
</div>
</div>
