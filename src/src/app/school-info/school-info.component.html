<div class="page-wrapper">
    <!-- Hero Section with Background Image -->
    <div class="hero-section">
        <div class="hero-overlay">
            <img src="assets/images/school.png" alt="School Logo" class="logo">
            <h1 class="fade-in">{{ schoolName }}</h1>
            <p class="fade-in-delay">Empowering minds, shaping futures – join our community!</p>
        </div>
    </div>

    <!-- Content Section -->
    <div class="content-container">
        <div class="info-card glassmorphism">
            <h2><i class="fas fa-address-book pulse"></i> Get in Touch</h2>
            <div class="contact-item">
                <i class="fas fa-envelope"></i>
                <p><strong>Email :  </strong> <a href="mailto:{{ email }}">{{ email }}</a></p>
            </div>
            <div class="contact-item">
                <i class="fas fa-phone"></i>
                <p><strong>Mobile :  </strong> <a href="tel:{{ mobileNumber }}">{{ mobileNumber }}</a></p>
            </div>
            <div class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <p><strong>Address :  </strong> {{ address }}</p>
            </div>
        </div>

        <div class="social-card glassmorphism">
            <h2><i class="pi pi-globe pulse"></i> Connect with Us</h2> <!-- Changed to pi pi-globe -->
            <div class="social-icons">
                <p-button *ngFor="let social of socialMedia" [icon]="social.icon"
                    styleClass="p-button-rounded p-button-text" [routerLink]="social.url" target="_blank"
                    [title]="social.name">
                </p-button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2023 {{ schoolName }}. All rights reserved. | Designed with ❤️ for education.</p>
    </footer>
</div>
