<p-toast position="top-center" key="tc"></p-toast>
<div class="p15 pl25">
    <div class="gilroyNormal s13 fw600">Attendance</div>
    <div class="whiteDivision">
        <div class="dropdownComponent ml23">
            <div class="dropdownName">Date</div>
            <p-calendar [(ngModel)]="selectedDate" [showClear]="true" [minDate]="minDate" [maxDate]="maxDate"
                [style]="{'width':'220px'}" [readonlyInput]="true" dateFormat="dd/mm/yy" placeholder="Date"
                [iconDisplay]="'input'" [showIcon]="true" class="dateInput"></p-calendar>
        </div>
        <div class="dropdownComponent ml12">
            <div class="dropdownName">Class</div>
            <p-dropdown [options]="classes" [(ngModel)]="selectedClass" optionLabel="name" class="pDropdown"
                filterBy="name" placeholder="Select Section" [filter]="true" [showClear]="true"
                (onChange)="onClassChange()">
                <ng-template let-cls pTemplate="item">
                    <div class="align-items-center gap-0 dropdown-items">
                        <div>{{cls.name}}</div>
                    </div>
                </ng-template>
            </p-dropdown>
        </div>
        <div class="dropdownComponent ml12">
            <div class="dropdownName">Section</div>
            <p-dropdown [options]="filteredSections" [(ngModel)]="selectedSection" optionLabel="sectionName"
                class="pDropdown" filterBy="sectionName" placeholder="Select Section" [filter]="true" [showClear]="true"
                (onChange)="loadSectionsByClass()">
                <ng-template let-sec pTemplate="item">
                    <div class="align-items-center gap-0 dropdown-items">
                        <div>{{sec.sectionName}}</div>
                    </div>
                </ng-template>
            </p-dropdown>
        </div>
        <div class="disp-inline-block v-align-bottom">
            <div [class]="selectedSection && selectedClass && selectedDate ? 'active-btn ml15' : 'inactive-btn ml15'"
                (click)=" selectedSection && selectedClass && selectedDate ? getattendance() : ''"
                [style.width]="enableSearchLoading ? '130px' : '90px'" style="transition: width .5s"
                [style.cursor]="enableSearchLoading ? 'not-allowed' : ''">
                <span *ngIf="!enableSearchLoading">Search</span>
                <span *ngIf="enableSearchLoading"><i class="pi pi-spin pi-spinner"
                        style="font-size: 12px; animation: fa-spin 1s infinite linear; margin-right: 5px; margin-left: -5px;"></i>Searching...</span>
            </div>
            <div [class]="selectedSection && selectedClass && selectedDate ? 'reset-btn ml10 reset-btn-enabled' : 'reset-btn ml10'"
                (click)="selectedSection && selectedClass && selectedDate ? resetFilters() : ''">Reset</div>
        </div>
        <!-- <div class="bt-clear-ft ml15" (click)="resetFilters()">Clear</div> -->
    </div>
    <div class="whiteDivision mt15 grid-table">
        <p-table #dt1 [value]="attendance" [multiSortMeta]="tableMultiSortingMetaData" [paginator]="true"
            [rows]="tableRows" [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
            [rowsPerPageOptions]="[5, 10, 20, 50]" sortMode="multiple" styleClass="p-datatable-sm table-generic-style">
            <ng-template pTemplate="header">
                <tr>
                    <th scope="col" pSortableColumn="name"> Name<p-sortIcon field="name"></p-sortIcon>
                    </th>
                    <th scope="col" pSortableColumn="class"> Class<p-sortIcon field="class"></p-sortIcon>
                    </th>
                    <th scope="col" pSortableColumn="section"> Section<p-sortIcon field="section"></p-sortIcon>
                    </th>
                    <th scope="col" pSortableColumn="status"> Status<p-sortIcon field="status"></p-sortIcon>
                    </th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-student let-i="rowIndex">
                <tr>
                    <td>{{student.name}}</td>
                    <td>{{selectedClass.name}}</td>
                    <td>{{selectedSection.sectionName}}</td>
                    <td>
                        <p-radioButton name="s{{i}}" [value]="true"
                            [(ngModel)]="student.attendanceStatus"></p-radioButton>
                        Present
                        <p-radioButton name="s{{i}}" [value]="false"
                            [(ngModel)]="student.attendanceStatus"></p-radioButton> Absent
                        <!-- <p-radioButton name="s{{i}}" value="Late" [(ngModel)]="student.attendanceStatus"></p-radioButton> Late -->
                    </td>
                </tr>
            </ng-template>
        </p-table>
        <!-- <div class="success-btn mt15" (click)="saveAttendance()">
            Save Attendance
        </div> -->
        <button type="submit" class="success-btn fw600 addlPaddingNBorder" (click)="saveAttendance()"
            [style.background-color]="showLoading ? '#860063' : ''" [style.width]="showLoading ? '130px' : ''">
            <span *ngIf="!showLoading">Save</span>
            <span *ngIf="showLoading"><i class="pi pi-spin pi-spinner"
                    style="font-size: 12px; animation: fa-spin 1s infinite linear; margin-right: 5px; margin-left: -5px;"></i>Saving...</span>
        </button>
    </div>
</div>
